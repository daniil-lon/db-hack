<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Passive Capital</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg-color: #0b0e16; --card-bg: #161b26; --accent-blue: #246bfd; --text-gray: #8a8d97; }
        body { background-color: var(--bg-color); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        .page { display: none; padding-bottom: 80px; }
        .page.active { display: block; }
        
        /* Дизайн карточек как на скринах */
        .balance-card { background: linear-gradient(135deg, #1c2538 0%, #111827 100%); border-radius: 24px; padding: 25px; margin-bottom: 15px; border: 1px solid #ffffff0a; position: relative; }
        .blue-gradient-card { background: linear-gradient(135deg, #246bfd 0%, #0b3fa9 100%); border-radius: 24px; padding: 25px; margin-bottom: 15px; }
        
        .amount { font-size: 36px; font-weight: bold; margin: 10px 0; }
        .label { color: var(--text-gray); font-size: 12px; text-transform: uppercase; }
        
        .btn-main { background: var(--accent-blue); color: white; border: none; width: 100%; padding: 15px; border-radius: 16px; font-weight: 600; margin-top: 10px; }
        .btn-secondary { background: #ffffff0a; color: white; border: 1px solid #ffffff10; width: 100%; padding: 12px; border-radius: 16px; margin-top: 10px; }

        /* Нижняя навигация */
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #111827; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ffffff10; }
        .nav-item { color: var(--text-gray); font-size: 10px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>
    <div id="home" class="page active">
        <div class="balance-card">
            <div class="label">Баланс активов</div>
            <div class="amount">143 ₽</div>
            <div style="display: flex; justify-content: space-between; margin-top: 15px;">
                <div><small style="color:#00ff88">↗ +10</small><br><span class="label">Прибыль</span></div>
                <div><small>0</small><br><span class="label">Партнеры</span></div>
                <div><small>0</small><br><span class="label">Выведено</span></div>
            </div>
        </div>
        <button class="btn-main" onclick="tg.HapticFeedback.impactOccurred('medium')">↗ Пополнить баланс</button>
        <button class="btn-secondary">💬 Перейти на форум</button>
    </div>

    <div id="portfolio" class="page">
        <div style="display:flex; justify-content: space-between; padding: 10px;">
            <div class="label">Всего вложено<br><b style="color:white; font-size: 18px;">400,00 ₽</b></div>
            <div class="label">Доход в сутки<br><b style="color:#00ff88; font-size: 18px;">+38,40 ₽</b></div>
        </div>
        <div class="balance-card" style="border: 1px solid #246bfd55;">
            <div style="display:flex; justify-content: space-between;">
                <span>⚡ Тариф 9.6%</span>
                <span style="color:#00ff88; font-size: 12px;">● В работе</span>
            </div>
            <div style="display: flex; gap: 20px; margin-top: 20px;">
                <div><small class="label">Текущая прибыль</small><br><b style="color:#00ff88">+22,19 ₽</b></div>
                <div><small class="label">Вклад</small><br><b>400,00 ₽</b></div>
            </div>
            <button class="btn-secondary" style="border-color: #246bfd; color: #246bfd;">+ Добавить к депозиту</button>
        </div>
    </div>

    <div id="wallet" class="page">
        <div class="blue-gradient-card">
            <div class="label" style="color: #ffffffcc;">Доступно к выводу</div>
            <div class="amount">622,04 ₽</div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-secondary">↗ Пополнить</button>
            <button class="btn-secondary">↙ Вывести</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="switchTab('home')">🏠<br>Главная</div>
        <div class="nav-item" onclick="switchTab('portfolio')">💼<br>Портфель</div>
        <div class="nav-item" onclick="switchTab('wallet')">👛<br>Кошелек</div>
        <div class="nav-item">👥<br>Партнеры</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#0b0e16';

        function switchTab(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
            tg.HapticFeedback.selectionChanged();
        }
    </script>
</body>
</html>
